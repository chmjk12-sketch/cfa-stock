name: Deploy CFA Stock

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: cfa-stock
  APP_PORT: "4000"
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
  REGISTRY_NAMESPACE: chmjk67
  DOMAIN: chmjk67.top
  ECS_IP: 39.105.86.184
  IMAGE: ${{ secrets.REGISTRY_URL }}/chmjk67/cfa-stock:${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Deploy via SSH
        id: ssh-deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30s
          script: |
            /opt/app/scripts/deploy.sh \
              --app-name ${{ env.APP_NAME }} \
              --image ${{ env.IMAGE }} \
              --port ${{ env.APP_PORT }} \
              --internal-port 80 \
              --health-path /

      - name: Deploy via RunCommand (fallback)
        if: steps.ssh-deploy.outcome == 'failure'
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          python3 .github/scripts/deploy.py

      - name: Ensure DNS
        if: success()
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          python3 .github/scripts/ensure_dns.py

      - name: Verify deployment
        run: |
          sleep 20
          echo "Verifying..."
          curl -sf "http://${ECS_IP}:${APP_PORT}/health" && echo "HEALTH_OK" || echo "HEALTH_FAIL"
          echo "Done - visit https://cfa-stock.chmjk67.top after DNS propagates"
